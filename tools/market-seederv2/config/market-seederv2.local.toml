# Public EveJS TQ market snapshot seeder config.
# This builds the SQLite database consumed by externalservices/market-server.

[input]
# Local Public EveJS authority data used for station, system, region, and type names.
static_data_dir = "../../server/src/newDatabase/data"

[output]
# The market daemon reads this same database path by default.
database_path = "../../externalservices/market-server/data/generated/market.sqlite"

[source]
# EVE Ref publishes the latest full public market order snapshot here.
index_url = "https://data.everef.net/market-orders/index.json"
download_dir = "cache"
user_agent = "PublicEveJS market-seederv2/0.1"

[build]
sqlite_cache_size_kib = 262144
sqlite_page_size_bytes = 32768
sqlite_worker_threads = 24
insert_batch_rows = 100000
