# Example standalone EvEJS market daemon config.

[network]
host = "127.0.0.1"
port = 40110

[rpc]
enabled = true
host = "127.0.0.1"
port = 40111

[storage]
database_path = "data/generated/market.sqlite"

[runtime]
cache_station_summaries = true
cache_system_summaries = true
station_summary_cache_capacity = 256
system_summary_cache_capacity = 256
order_book_cache_capacity = 2048

[tq_live]
# TQ mirroring is toggled from the live market-server console:
#   tq on
#   tq off
#   tq now
#   tq status
update_interval_seconds = 300
source_base_url = "https://esi.evetech.net/latest"
user_agent = "PublicEveJS-TQLiveMarket/0.1 (local-private-server; contact: local-admin)"
request_concurrency = 8
request_timeout_seconds = 45
region_pause_millis = 100
region_ids = []
dashboard_enabled = true

[logging]
log_level = "info"
